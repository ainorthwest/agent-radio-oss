# Lightcone Studios — Shared Pre-commit Configuration
#
# Copy to your repo root as .pre-commit-config.yaml, then run:
#   pre-commit install
#
# See specs/development-workflow.md for rationale and repo-specific profiles.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        # OSS ships pre-rendered show assets (intros/outros/stings) as
        # committed WAVs. Raised from the production cap of 1024 to keep
        # them in-tree until Day 4 wires Stable Audio Open to regenerate.
        args: ['--maxkb=4096']
      - id: check-merge-conflict
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  # Shell-script linting — Day 5 introduces scripts/ as a first-class
  # surface (setup scripts, smoke test, model downloader). shellcheck
  # catches unquoted vars / typos / unsafe patterns; shfmt enforces a
  # single house style. Both scoped to scripts/ so we don't lint the
  # whisper.cpp submodule's vendor scripts.
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        files: ^scripts/.*\.sh$
        args: [-x, -S, warning]

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        files: ^scripts/.*\.sh$
        args: [-i, '2', -ci, -bn, -d]
