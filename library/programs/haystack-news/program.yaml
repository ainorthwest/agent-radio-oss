name: Haystack News
slug: haystack-news
type: talk
status: active
schedule: daily
description: "AI news digest — the week in artificial intelligence, told by three Kokoro hosts on whatever hardware you've got."

# Three Kokoro hosts. Pure named-voice presets — no reference audio,
# no PII. Voice IDs come from the kokoro-onnx voices manifest.
cast:
  host_a:
    profile: voices/kokoro-michael.yaml
  host_b:
    profile: voices/kokoro-bella.yaml
  host_c:
    profile: voices/kokoro-adam.yaml

timing:
  gaps:
    baseline: 0.65
    emphasis: 0.50
    reflective: 1.1
    reactive: 0.25
    topic_transition: 0.35
    jitter: 0.1

music:
  intro: library/programs/haystack-news/assets/theme.wav
  intro_preroll_s: 3.0
  outro: library/programs/haystack-news/assets/outro_002.wav
  sting: library/programs/haystack-news/assets/sting.wav
  duck_db: -18
  bed_level_db: -6
  fade_ms: 50

distribution:
  r2: true
  discourse: false
  podcast: true
  azuracast:
    playlist: "Haystack News"
    type: default
    schedule:
      start_time: "0500"
      end_time: "0800"
      days: [1, 2, 3, 4, 5]
