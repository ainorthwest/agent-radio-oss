name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Sync dependencies
        run: uv sync --extra tts --extra quality --extra distribute --extra dev

      - name: Install shell-lint tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y shellcheck shfmt

      - name: Install shell-lint tools (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck shfmt

      - name: Shell lint (shellcheck + shfmt)
        shell: bash
        run: |
          # `find` instead of `**/*.sh` so this works on macOS bash 3.2
          # (default on macos-14 runners) where `globstar` is unavailable
          # and `mapfile` may not exist. We control every file under
          # `scripts/`, so newlines-in-names are not a concern here.
          if [ ! -d scripts ]; then
            echo "No scripts/ directory yet — skipping."
            exit 0
          fi
          if ! find scripts -name '*.sh' -print -quit | grep -q .; then
            echo "No shell scripts under scripts/ yet — skipping."
            exit 0
          fi
          find scripts -name '*.sh' -print0 |
            xargs -0 shellcheck -x -S warning
          find scripts -name '*.sh' -print0 |
            xargs -0 shfmt -i 2 -ci -bn -d

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy src/

      - name: Run tests
        run: uv run pytest -v
